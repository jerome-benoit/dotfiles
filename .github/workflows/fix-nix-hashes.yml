name: Fix Nix Hashes

on:
  pull_request:
    branches: [main]
    paths:
      - "home-manager/modules/development/pi.nix"
      - "flake.lock"

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  fix-hashes:
    if: startsWith(github.head_ref, 'renovate/')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Detect changed packages
        id: detect
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          if git diff "origin/$BASE_REF" --name-only | grep -q 'home-manager/modules/development/pi.nix'; then
            echo "pi=true" >> "$GITHUB_OUTPUT"
          fi
          if git diff "origin/$BASE_REF" -- flake.lock | grep -q 'agent-deck'; then
            echo "agent-deck=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Nix
        if: steps.detect.outputs.pi == 'true' || steps.detect.outputs.agent-deck == 'true'
        uses: nixbuild/nix-quick-install-action@v34
        with:
          nix_conf: |
            extra-experimental-features = nix-command flakes

      - name: Update pi-coding-agent hashes
        if: steps.detect.outputs.pi == 'true'
        env:
          PI_NIX: home-manager/modules/development/pi.nix
          PI_LOCK: home-manager/modules/development/pi-package-lock.json
        run: |
          set -euo pipefail

          VERSION=$(sed -n 's/.*version = "\([^"]*\)".*/\1/p' "$PI_NIX" | head -1)
          [[ -n "$VERSION" ]] || { echo "::error::Failed to extract version from $PI_NIX"; exit 1; }

          URL_TEMPLATE=$(sed -n 's/.*url = "\(.*\)".*/\1/p' "$PI_NIX" | head -1)
          [[ -n "$URL_TEMPLATE" ]] || { echo "::error::Failed to extract URL template from $PI_NIX"; exit 1; }

          URL=$(printf '%s\n' "$URL_TEMPLATE" | sed "s/\${finalAttrs\.version}/$VERSION/g")

          FETCH_HASH=$(nix store prefetch-file --unpack --json "$URL" | jq -r '.hash')
          [[ "$FETCH_HASH" == sha256-* ]] || { echo "::error::Invalid fetch hash: $FETCH_HASH"; exit 1; }
          awk -v h="$FETCH_HASH" '{gsub(/hash = "sha256-[^"]*"/, "hash = \"" h "\"")}1' "$PI_NIX" > "$PI_NIX.tmp" && mv "$PI_NIX.tmp" "$PI_NIX"

          WORKDIR="$(mktemp -d)"
          curl -sfSL "$URL" | tar xz -C "$WORKDIR" --strip-components=1
          cd "$WORKDIR"
          npm install --package-lock-only --ignore-scripts

          NPM_HASH=$(nix run nixpkgs#prefetch-npm-deps -- ./package-lock.json)
          [[ "$NPM_HASH" == sha256-* ]] || { echo "::error::Invalid npm deps hash: $NPM_HASH"; exit 1; }
          awk -v h="$NPM_HASH" '{gsub(/npmDepsHash = "sha256-[^"]*"/, "npmDepsHash = \"" h "\"")}1' "$GITHUB_WORKSPACE/$PI_NIX" > "$GITHUB_WORKSPACE/$PI_NIX.tmp" && mv "$GITHUB_WORKSPACE/$PI_NIX.tmp" "$GITHUB_WORKSPACE/$PI_NIX"
          cp package-lock.json "$GITHUB_WORKSPACE/$PI_LOCK"

      - name: Update agent-deck vendorHash
        if: steps.detect.outputs.agent-deck == 'true'
        env:
          AD_NIX: home-manager/modules/development/agent-deck.nix
        run: |
          set -euo pipefail

          awk '{gsub(/vendorHash = "sha256-[^"]*"/, "vendorHash = \"sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=\"")}1' "$AD_NIX" > "$AD_NIX.tmp" && mv "$AD_NIX.tmp" "$AD_NIX"

          BUILD_OUTPUT=$(nix build --impure --no-link --extra-experimental-features 'nix-command flakes' \
            --expr "(builtins.getFlake \"path:$GITHUB_WORKSPACE\").homeConfigurations.fraggle.config.modules.development.agent-deck.package.goModules" 2>&1 || true)

          VENDOR_HASH=$(printf '%s\n' "$BUILD_OUTPUT" | awk '/got:.*sha256-/ { print $2 }')
          if [[ "$VENDOR_HASH" == sha256-* ]]; then
            awk -v h="$VENDOR_HASH" '{gsub(/vendorHash = "sha256-[^"]*"/, "vendorHash = \"" h "\"")}1' "$AD_NIX" > "$AD_NIX.tmp" && mv "$AD_NIX.tmp" "$AD_NIX"
          else
            echo "::warning::Failed to extract vendor hash, reverting"
            git checkout -- "$AD_NIX"
          fi

      - name: Commit hash fixes
        env:
          PI_NIX: home-manager/modules/development/pi.nix
          PI_LOCK: home-manager/modules/development/pi-package-lock.json
          AD_NIX: home-manager/modules/development/agent-deck.nix
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$PI_NIX" "$PI_LOCK" "$AD_NIX"
          if ! git diff --cached --quiet; then
            git commit -m "fix: update nix hashes for version bump"
            git push
          fi

name: Check Nix Configuration

on:
  push:
    branches: [main]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "home-manager/**"
      - "checks/**"
      - "constants.nix"
      - "patches/**"
      - "statix.toml"
      - ".github/workflows/check.yml"
  pull_request:
    branches: [main]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "home-manager/**"
      - "checks/**"
      - "constants.nix"
      - "patches/**"
      - "statix.toml"
      - ".github/workflows/check.yml"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
            extra_nix_conf: "build-dir = /nix/build"
          - os: macos-latest
            system: aarch64-darwin
            extra_nix_conf: ""

    runs-on: ${{ matrix.os }}
    name: Check (${{ matrix.system }})
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v6

      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        uses: wimpysworld/nothing-but-nix@v10
        with:
          hatchet-protocol: rampage
          witness-carnage: true
          nix-permission-edict: true

      - name: Free disk space (macOS)
        if: runner.os == 'macOS'
        run: |
          sudo rm -rf /Applications/Xcode*.app
          sudo rm -rf /Library/Developer
          sudo rm -rf /Library/Android
          sudo rm -rf ~/Library/Developer/CoreSimulator
          sudo rm -rf /usr/local/share/dotnet
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/share/chromedriver*
          sudo rm -rf /usr/local/share/edge_driver
          sudo rm -rf /Applications/Google\ Chrome*.app
          sudo rm -rf /Applications/Firefox.app

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v34
        with:
          nix_conf: |
            keep-outputs = true
            keep-env-derivations = true
            ${{ matrix.extra_nix_conf }}

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 6G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: Run flake checks
        run: nix flake check --show-trace
